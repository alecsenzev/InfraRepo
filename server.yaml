heat_template_version: 2015-10-15
description: Create a server for RestoringValuesSPbPU project

resources:
  # Описываем сервер
  my_server:
    type: OS::Nova::Server
    properties:
      name: Nikita-ML-Server       # Имя будущей машины
      image: debian-10           # Образ
      flavor: m1.tiny              # Размер изночальный m1.small
      key_name: Nikita_Alecsentsev  # Ключ
      networks:
        - network: sutdents-net     # Сеть
      
      # Метаданные для идентификации
      metadata:
        project: "RestoringValuesSPbPU"
        owner: "Nikita Alecsentsev"
      
      # Скрипт для первоначальной настройки (user_data)
      user_data:
      |
        #!/bin/bash
        apt update
        apt install -y python3-pip python3-venv git postgresql
        echo "Сервер создан через Heat" > /etc/motd
        echo "Проект: RestoringValuesSPbPU" >> /etc/motd
        echo "Дата создания: $(date)" >> /etc/motd
