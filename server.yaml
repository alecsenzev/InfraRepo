stage('Diagnose Network Issues') {
    steps {
        script {
            sh """
                echo "=== ДИАГНОСТИКА СЕТИ ==="
                echo "Проверка сервера ${env.TARGET_SERVER_IP}"
                
                # Проверяем, пингуется ли сервер
                echo "1. Проверка ICMP (ping):"
                ping -c 4 ${env.TARGET_SERVER_IP} || echo "PING не работает (возможно запрещено)"
                
                # Проверяем открытые порты
                echo "2. Проверка открытых портов:"
                nc -zv ${env.TARGET_SERVER_IP} 22 2>&1 || echo "Порт 22 закрыт"
                nc -zv ${env.TARGET_SERVER_IP} 80 2>&1 || echo "Порт 80 закрыт"
                nc -zv ${env.TARGET_SERVER_IP} 8080 2>&1 || echo "Порт 8080 закрыт"
                
                # Получаем информацию о сервере из OpenStack
                echo "3. Информация о сервере из OpenStack:"
                . /home/ubuntu/openrc.sh
                
                SERVER_ID=\$(openstack stack resource list $STACK_NAME -f value -c physical_resource_id | head -1)
                echo "Server ID: \$SERVER_ID"
                
                echo "Статус сервера:"
                openstack server show \$SERVER_ID -c status -c addresses -c security_groups
                
                echo "Список security groups:"
                openstack server show \$SERVER_ID -f value -c security_groups
                
                echo "=== КОНЕЦ ДИАГНОСТИКИ ==="
            """
        }
    }
}
